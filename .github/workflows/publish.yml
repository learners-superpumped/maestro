name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          CURR=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PREV=$(git show HEAD~1:pyproject.toml 2>/dev/null | python -c "import sys,tomllib; print(tomllib.load(sys.stdin.buffer)['project']['version'])" 2>/dev/null || echo "")
          echo "version=$CURR" >> "$GITHUB_OUTPUT"
          if [ "$CURR" != "$PREV" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREV → $CURR"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $CURR"
          fi

  build-and-publish:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/maestrod/
    steps:
      - uses: actions/checkout@v4

      # 1. Build web dashboard
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npm run build

      # 2. Bundle web into Python package
      - run: |
          rm -f src/maestro/_static/.gitkeep
          cp -r web/dist/* src/maestro/_static/

      # 3. Build Python package
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build

      # 4. Verify wheel contains static files
      - run: |
          pip install dist/maestrod-*.whl
          python -c "
          from pathlib import Path; import maestro
          static = Path(maestro.__file__).parent / '_static'
          assert (static / 'index.html').exists(), 'index.html missing from wheel!'
          print(f'Static files bundled at: {static}')
          print(list(static.iterdir()))
          "

      # 5. Publish to PyPI via Trusted Publisher
      - uses: pypa/gh-action-pypi-publish@release/v1
