name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/maestrod/
    steps:
      - uses: actions/checkout@v4

      # 1. Build web dashboard
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npm run build

      # 2. Bundle web into Python package
      - run: |
          rm -f src/maestro/_static/.gitkeep
          cp -r web/dist/* src/maestro/_static/

      # 3. Build Python package
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build

      # 4. Verify wheel contains static files
      - run: |
          pip install dist/maestrod-*.whl
          python -c "
          from pathlib import Path; import maestro
          static = Path(maestro.__file__).parent / '_static'
          assert (static / 'index.html').exists(), 'index.html missing from wheel!'
          print(f'Static files bundled at: {static}')
          print(list(static.iterdir()))
          "

      # 5. Publish to PyPI via Trusted Publisher
      - uses: pypa/gh-action-pypi-publish@release/v1
