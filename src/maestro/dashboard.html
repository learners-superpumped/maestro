<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maestro Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none !important; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-800 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold text-sm">M</div>
        <h1 class="text-xl font-semibold">Maestro</h1>
      </div>
      <nav class="flex gap-1">
        <button onclick="showPage('dashboard')" id="nav-dashboard" class="nav-btn px-3 py-1.5 rounded-md text-sm font-medium bg-gray-800 text-white">Dashboard</button>
        <button onclick="showPage('tasks')" id="nav-tasks" class="nav-btn px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800">Tasks</button>
        <button onclick="showPage('approvals')" id="nav-approvals" class="nav-btn px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800">Approvals</button>
        <button onclick="showPage('assets')" id="nav-assets" class="nav-btn px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800">Assets</button>
      </nav>
      <div class="flex items-center gap-3">
        <span id="auto-refresh-indicator" class="text-xs text-gray-500">Auto-refresh: 10s</span>
        <span id="connection-status" class="w-2 h-2 rounded-full bg-green-500" title="Connected"></span>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-6">

    <!-- Dashboard Page -->
    <div id="page-dashboard" class="page fade-in">
      <!-- Stats Cards -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
          <div class="text-sm text-gray-400 mb-1">Running Tasks</div>
          <div id="stat-running" class="text-3xl font-bold text-indigo-400">-</div>
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
          <div class="text-sm text-gray-400 mb-1">Pending Approvals</div>
          <div id="stat-approvals" class="text-3xl font-bold text-amber-400">-</div>
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
          <div class="text-sm text-gray-400 mb-1">Today's Spend</div>
          <div id="stat-spend" class="text-3xl font-bold text-emerald-400">-</div>
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
          <div class="text-sm text-gray-400 mb-1">Total Tasks</div>
          <div id="stat-total" class="text-3xl font-bold text-gray-300">-</div>
        </div>
      </div>

      <!-- Status Breakdown -->
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 mb-8">
        <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Status Breakdown</h2>
        <div id="status-breakdown" class="flex flex-wrap gap-3"></div>
      </div>

      <!-- Recent Tasks -->
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
        <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Recent Tasks</h2>
        <div id="recent-tasks" class="space-y-2">
          <div class="text-gray-500 text-sm">Loading...</div>
        </div>
      </div>
    </div>

    <!-- Tasks Page -->
    <div id="page-tasks" class="page hidden fade-in">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-semibold">All Tasks</h2>
        <div class="flex gap-2">
          <select id="filter-status" onchange="loadTasks()" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-gray-300">
            <option value="">All statuses</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="claimed">Claimed</option>
            <option value="running">Running</option>
            <option value="paused">Paused</option>
            <option value="retry_queued">Retry Queued</option>
            <option value="completed">Completed</option>
            <option value="failed">Failed</option>
            <option value="cancelled">Cancelled</option>
          </select>
          <select id="filter-workspace" onchange="loadTasks()" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-gray-300">
            <option value="">All workspaces</option>
          </select>
        </div>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-800">
              <th class="text-left px-4 py-3 text-gray-400 font-medium">Title</th>
              <th class="text-left px-4 py-3 text-gray-400 font-medium">Status</th>
              <th class="text-left px-4 py-3 text-gray-400 font-medium">Workspace</th>
              <th class="text-left px-4 py-3 text-gray-400 font-medium">Priority</th>
              <th class="text-left px-4 py-3 text-gray-400 font-medium">Cost</th>
              <th class="text-left px-4 py-3 text-gray-400 font-medium">Created</th>
            </tr>
          </thead>
          <tbody id="tasks-tbody">
            <tr><td colspan="6" class="px-4 py-8 text-center text-gray-500">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Task Detail Page -->
    <div id="page-task-detail" class="page hidden fade-in">
      <button onclick="showPage('tasks')" class="text-sm text-indigo-400 hover:text-indigo-300 mb-4 inline-block">&larr; Back to Tasks</button>
      <div id="task-detail-content" class="space-y-6">
        <div class="text-gray-500">Loading...</div>
      </div>
    </div>

    <!-- Approvals Page -->
    <div id="page-approvals" class="page hidden fade-in">
      <h2 class="text-lg font-semibold mb-6">Pending Approvals</h2>
      <div id="approvals-list" class="space-y-4">
        <div class="text-gray-500 text-sm">Loading...</div>
      </div>
    </div>

    <!-- Assets Page -->
    <div id="page-assets" class="page hidden fade-in">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-semibold">Assets</h2>
        <select id="filter-asset-type" onchange="loadAssets()" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-gray-300">
          <option value="">All types</option>
          <option value="image">Image</option>
          <option value="video">Video</option>
          <option value="audio">Audio</option>
          <option value="document">Document</option>
          <option value="code">Code</option>
        </select>
      </div>
      <div id="assets-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="text-gray-500 text-sm">Loading...</div>
      </div>
    </div>

  </main>

<script>
// ---------------------------------------------------------------------------
// API helpers
// ---------------------------------------------------------------------------
const API = '';  // Same origin - served by the daemon

async function api(path, opts) {
  opts = opts || {};
  try {
    var resp = await fetch(API + path, opts);
    if (!resp.ok) {
      var text = await resp.text();
      throw new Error(resp.status + ': ' + text);
    }
    return await resp.json();
  } catch (err) {
    console.error('API error:', path, err);
    setConnectionStatus(false);
    throw err;
  }
}

function setConnectionStatus(ok) {
  var el = document.getElementById('connection-status');
  el.className = ok
    ? 'w-2 h-2 rounded-full bg-green-500'
    : 'w-2 h-2 rounded-full bg-red-500';
  el.title = ok ? 'Connected' : 'Disconnected';
}

// ---------------------------------------------------------------------------
// Status badge helper
// ---------------------------------------------------------------------------
var STATUS_COLORS = {
  pending:      'bg-yellow-900/50 text-yellow-300 border-yellow-700/50',
  approved:     'bg-blue-900/50 text-blue-300 border-blue-700/50',
  claimed:      'bg-cyan-900/50 text-cyan-300 border-cyan-700/50',
  running:      'bg-indigo-900/50 text-indigo-300 border-indigo-700/50',
  paused:       'bg-orange-900/50 text-orange-300 border-orange-700/50',
  retry_queued: 'bg-amber-900/50 text-amber-300 border-amber-700/50',
  completed:    'bg-emerald-900/50 text-emerald-300 border-emerald-700/50',
  failed:       'bg-red-900/50 text-red-300 border-red-700/50',
  cancelled:    'bg-gray-800/50 text-gray-400 border-gray-600/50'
};

function statusBadge(status) {
  var cls = STATUS_COLORS[status] || 'bg-gray-800 text-gray-400';
  return '<span class="inline-block px-2 py-0.5 rounded-md text-xs font-medium border ' + cls + '">' + escHtml(status) + '</span>';
}

function priorityLabel(p) {
  var labels = { 1: 'Urgent', 2: 'High', 3: 'Normal', 4: 'Low', 5: 'Lowest' };
  return labels[p] || ('P' + p);
}

function timeAgo(iso) {
  if (!iso) return '-';
  var d = new Date(iso);
  var diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return Math.floor(diff) + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function shortPath(ws) {
  if (!ws) return '-';
  var parts = ws.split('/');
  return parts.length > 2 ? parts.slice(-2).join('/') : ws;
}

// ---------------------------------------------------------------------------
// Safe DOM rendering helpers
// ---------------------------------------------------------------------------
function escHtml(str) {
  if (str === null || str === undefined) return '';
  var div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

function setText(el, text) {
  if (typeof el === 'string') el = document.getElementById(el);
  if (el) el.textContent = text;
}

function setHtml(el, html) {
  // Used only for rendering structured content from our own daemon API
  // All interpolated strings are escaped via escHtml() before insertion
  if (typeof el === 'string') el = document.getElementById(el);
  if (el) el.innerHTML = html;
}

// ---------------------------------------------------------------------------
// Page navigation
// ---------------------------------------------------------------------------
var currentPage = 'dashboard';

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(function(el) { el.classList.add('hidden'); });
  var target = document.getElementById('page-' + page);
  if (target) target.classList.remove('hidden');

  // Update nav
  document.querySelectorAll('.nav-btn').forEach(function(btn) {
    btn.className = 'nav-btn px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800';
  });
  var activeNav = document.getElementById('nav-' + page);
  if (activeNav) {
    activeNav.className = 'nav-btn px-3 py-1.5 rounded-md text-sm font-medium bg-gray-800 text-white';
  }

  // Load data for the page
  if (page === 'dashboard') loadDashboard();
  else if (page === 'tasks') loadTasks();
  else if (page === 'approvals') loadApprovals();
  else if (page === 'assets') loadAssets();
}

// ---------------------------------------------------------------------------
// Dashboard
// ---------------------------------------------------------------------------
async function loadDashboard() {
  try {
    var stats = await api('/api/internal/stats');
    setConnectionStatus(true);

    setText('stat-running', stats.running);
    setText('stat-approvals', stats.pending_approvals);
    setText('stat-spend', '$' + stats.today_spend_usd.toFixed(2));
    setText('stat-total', stats.total_tasks);

    // Status breakdown
    var bd = document.getElementById('status-breakdown');
    var counts = stats.status_counts;
    var keys = Object.keys(counts);
    if (keys.length === 0) {
      setHtml(bd, '<span class="text-gray-500 text-sm">No tasks yet</span>');
    } else {
      setHtml(bd, keys.map(function(s) {
        return '<div class="flex items-center gap-2">' + statusBadge(s) + ' <span class="text-gray-300 text-sm font-medium">' + escHtml(counts[s]) + '</span></div>';
      }).join(''));
    }

    // Recent tasks
    var data = await api('/api/internal/tasks');
    var tasks = data.tasks.slice(-10).reverse();
    var rt = document.getElementById('recent-tasks');
    if (tasks.length === 0) {
      setHtml(rt, '<div class="text-gray-500 text-sm">No tasks yet</div>');
    } else {
      setHtml(rt, tasks.map(function(t) {
        return '<div data-task-id="' + escHtml(t.id) + '" class="task-row flex items-center justify-between p-3 rounded-lg bg-gray-800/50 hover:bg-gray-800 cursor-pointer transition-colors">' +
          '<div class="flex items-center gap-3">' +
            statusBadge(t.status) +
            '<span class="text-sm font-medium text-gray-200">' + escHtml(t.title) + '</span>' +
            '<span class="text-xs text-gray-500">' + escHtml(shortPath(t.workspace)) + '</span>' +
          '</div>' +
          '<span class="text-xs text-gray-500">' + escHtml(timeAgo(t.created_at)) + '</span>' +
        '</div>';
      }).join(''));
      // Attach click handlers safely
      rt.querySelectorAll('.task-row').forEach(function(row) {
        row.addEventListener('click', function() {
          showTaskDetail(row.getAttribute('data-task-id'));
        });
      });
    }

    // Populate workspace filter
    var wsSet = {};
    data.tasks.forEach(function(t) { if (t.workspace) wsSet[t.workspace] = true; });
    var wsSel = document.getElementById('filter-workspace');
    var currentWs = wsSel.value;
    var wsOpts = '<option value="">All workspaces</option>';
    Object.keys(wsSet).forEach(function(w) {
      wsOpts += '<option value="' + escHtml(w) + '">' + escHtml(shortPath(w)) + '</option>';
    });
    setHtml(wsSel, wsOpts);
    wsSel.value = currentWs;
  } catch (err) {
    // Connection failed - already handled
  }
}

// ---------------------------------------------------------------------------
// Tasks
// ---------------------------------------------------------------------------
async function loadTasks() {
  try {
    var url = '/api/internal/tasks';
    var params = [];
    var status = document.getElementById('filter-status').value;
    var workspace = document.getElementById('filter-workspace').value;
    if (status) params.push('status=' + status);
    if (workspace) params.push('workspace=' + encodeURIComponent(workspace));
    if (params.length) url += '?' + params.join('&');

    var data = await api(url);
    setConnectionStatus(true);

    var tbody = document.getElementById('tasks-tbody');
    if (data.tasks.length === 0) {
      setHtml(tbody, '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-500">No tasks found</td></tr>');
    } else {
      setHtml(tbody, data.tasks.map(function(t) {
        return '<tr data-task-id="' + escHtml(t.id) + '" class="task-row border-b border-gray-800/50 hover:bg-gray-800/30 cursor-pointer transition-colors">' +
          '<td class="px-4 py-3">' +
            '<div class="font-medium text-gray-200">' + escHtml(t.title) + '</div>' +
            '<div class="text-xs text-gray-500 mt-0.5">' + escHtml(t.id) + '</div>' +
          '</td>' +
          '<td class="px-4 py-3">' + statusBadge(t.status) + '</td>' +
          '<td class="px-4 py-3 text-gray-400">' + escHtml(shortPath(t.workspace)) + '</td>' +
          '<td class="px-4 py-3 text-gray-400">' + escHtml(priorityLabel(t.priority)) + '</td>' +
          '<td class="px-4 py-3 text-gray-400">$' + escHtml(t.cost_usd.toFixed(2)) + '</td>' +
          '<td class="px-4 py-3 text-gray-500">' + escHtml(timeAgo(t.created_at)) + '</td>' +
        '</tr>';
      }).join(''));
      // Attach click handlers
      tbody.querySelectorAll('.task-row').forEach(function(row) {
        row.addEventListener('click', function() {
          showTaskDetail(row.getAttribute('data-task-id'));
        });
      });
    }

    // Update workspace filter if no filters active
    if (!status && !workspace) {
      var wsSet = {};
      data.tasks.forEach(function(t) { if (t.workspace) wsSet[t.workspace] = true; });
      var wsSel = document.getElementById('filter-workspace');
      var currentWs = wsSel.value;
      var wsOpts = '<option value="">All workspaces</option>';
      Object.keys(wsSet).forEach(function(w) {
        wsOpts += '<option value="' + escHtml(w) + '">' + escHtml(shortPath(w)) + '</option>';
      });
      setHtml(wsSel, wsOpts);
      wsSel.value = currentWs;
    }
  } catch (err) { /* handled */ }
}

// ---------------------------------------------------------------------------
// Task Detail
// ---------------------------------------------------------------------------
async function showTaskDetail(taskId) {
  currentPage = 'task-detail';
  document.querySelectorAll('.page').forEach(function(el) { el.classList.add('hidden'); });
  document.getElementById('page-task-detail').classList.remove('hidden');

  // Clear nav highlights
  document.querySelectorAll('.nav-btn').forEach(function(btn) {
    btn.className = 'nav-btn px-3 py-1.5 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-800';
  });

  var container = document.getElementById('task-detail-content');
  setHtml(container, '<div class="text-gray-500">Loading...</div>');

  try {
    var task = await api('/api/internal/task/' + encodeURIComponent(taskId));
    setConnectionStatus(true);

    var approvalHtml = '';
    if (task.status === 'paused') {
      try {
        var approval = await api('/api/internal/approval/' + encodeURIComponent(taskId));
        var draftPreview = '';
        try {
          var draft = typeof approval.draft_json === 'string' ? JSON.parse(approval.draft_json) : approval.draft_json;
          draftPreview = '<pre class="bg-gray-950 border border-gray-700 rounded-lg p-4 text-sm text-gray-300 overflow-auto max-h-64">' + escHtml(JSON.stringify(draft, null, 2)) + '</pre>';
        } catch (e) { draftPreview = '<div class="text-gray-500 text-sm">No draft content</div>'; }

        approvalHtml =
          '<div class="bg-amber-900/20 border border-amber-700/30 rounded-xl p-5">' +
            '<h3 class="text-sm font-semibold text-amber-300 uppercase tracking-wider mb-3">Pending Approval</h3>' +
            '<div class="mb-4">' + draftPreview + '</div>' +
            '<div class="flex gap-2">' +
              '<button data-action="approve" data-task="' + escHtml(taskId) + '" class="approval-btn px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium rounded-lg transition-colors">Approve</button>' +
              '<button data-action="reject" data-task="' + escHtml(taskId) + '" class="approval-btn px-4 py-2 bg-red-600 hover:bg-red-500 text-white text-sm font-medium rounded-lg transition-colors">Reject</button>' +
              '<button data-action="revise" data-task="' + escHtml(taskId) + '" class="approval-btn px-4 py-2 bg-amber-600 hover:bg-amber-500 text-white text-sm font-medium rounded-lg transition-colors">Revise</button>' +
            '</div>' +
          '</div>';
      } catch (e) { /* no approval record */ }
    }

    var budgetPct = task.budget_usd > 0 ? (task.cost_usd / task.budget_usd) * 100 : 0;

    var html =
      '<div class="flex items-center gap-3 mb-2">' +
        statusBadge(task.status) +
        '<span class="text-xs text-gray-500">' + escHtml(priorityLabel(task.priority)) + '</span>' +
      '</div>' +
      '<h2 class="text-2xl font-bold text-gray-100 mb-1">' + escHtml(task.title) + '</h2>' +
      '<div class="text-xs text-gray-500 mb-6">' + escHtml(task.id) + '</div>' +
      approvalHtml +
      '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">' +
        '<div class="bg-gray-900 border border-gray-800 rounded-xl p-5">' +
          '<h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Details</h3>' +
          '<dl class="space-y-2 text-sm">' +
            '<div class="flex justify-between"><dt class="text-gray-500">Type</dt><dd class="text-gray-300">' + escHtml(task.type) + '</dd></div>' +
            '<div class="flex justify-between"><dt class="text-gray-500">Workspace</dt><dd class="text-gray-300">' + escHtml(shortPath(task.workspace)) + '</dd></div>' +
            '<div class="flex justify-between"><dt class="text-gray-500">Approval Level</dt><dd class="text-gray-300">' + escHtml(task.approval_level) + '</dd></div>' +
            '<div class="flex justify-between"><dt class="text-gray-500">Attempts</dt><dd class="text-gray-300">' + escHtml(task.attempt) + ' / ' + escHtml(task.max_retries) + '</dd></div>' +
            '<div class="flex justify-between"><dt class="text-gray-500">Session ID</dt><dd class="text-gray-300 truncate max-w-[200px]">' + escHtml(task.session_id || '-') + '</dd></div>' +
          '</dl>' +
        '</div>' +
        '<div class="bg-gray-900 border border-gray-800 rounded-xl p-5">' +
          '<h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Budget</h3>' +
          '<dl class="space-y-2 text-sm">' +
            '<div class="flex justify-between"><dt class="text-gray-500">Cost</dt><dd class="text-gray-300">$' + escHtml(task.cost_usd.toFixed(4)) + '</dd></div>' +
            '<div class="flex justify-between"><dt class="text-gray-500">Budget</dt><dd class="text-gray-300">$' + escHtml(task.budget_usd.toFixed(2)) + '</dd></div>' +
            '<div class="flex justify-between"><dt class="text-gray-500">Created</dt><dd class="text-gray-300">' + escHtml(timeAgo(task.created_at)) + '</dd></div>' +
            '<div class="flex justify-between"><dt class="text-gray-500">Updated</dt><dd class="text-gray-300">' + escHtml(timeAgo(task.updated_at)) + '</dd></div>' +
          '</dl>' +
          '<div class="mt-3">' +
            '<div class="w-full bg-gray-800 rounded-full h-2">' +
              '<div class="bg-indigo-500 rounded-full h-2" style="width: ' + Math.min(100, budgetPct) + '%"></div>' +
            '</div>' +
            '<div class="text-xs text-gray-500 mt-1">' + escHtml(budgetPct.toFixed(1)) + '% of budget used</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="bg-gray-900 border border-gray-800 rounded-xl p-5">' +
        '<h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Instruction</h3>' +
        '<pre class="bg-gray-950 border border-gray-700 rounded-lg p-4 text-sm text-gray-300 whitespace-pre-wrap">' + escHtml(task.instruction) + '</pre>' +
      '</div>';

    if (task.error) {
      html +=
        '<div class="bg-red-900/20 border border-red-700/30 rounded-xl p-5">' +
          '<h3 class="text-sm font-semibold text-red-400 uppercase tracking-wider mb-3">Error</h3>' +
          '<pre class="text-sm text-red-300 whitespace-pre-wrap">' + escHtml(task.error) + '</pre>' +
        '</div>';
    }

    if (task.result_json) {
      html +=
        '<div class="bg-gray-900 border border-gray-800 rounded-xl p-5">' +
          '<h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Result</h3>' +
          '<pre class="bg-gray-950 border border-gray-700 rounded-lg p-4 text-sm text-gray-300 overflow-auto max-h-64">' + escHtml(JSON.stringify(task.result_json, null, 2)) + '</pre>' +
        '</div>';
    }

    setHtml(container, html);

    // Attach approval action handlers
    container.querySelectorAll('.approval-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var action = btn.getAttribute('data-action');
        var tid = btn.getAttribute('data-task');
        if (action === 'approve') approveTask(tid);
        else if (action === 'reject') rejectTask(tid);
        else if (action === 'revise') reviseTask(tid);
      });
    });
  } catch (err) {
    setHtml(container, '<div class="text-red-400">Failed to load task: ' + escHtml(err.message) + '</div>');
  }
}

// ---------------------------------------------------------------------------
// Approval actions
// ---------------------------------------------------------------------------
async function approveTask(taskId) {
  try {
    await api('/api/internal/task/' + encodeURIComponent(taskId) + '/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}'
    });
    showTaskDetail(taskId);
  } catch (err) { alert('Approve failed: ' + err.message); }
}

async function rejectTask(taskId) {
  var note = prompt('Rejection note (optional):');
  try {
    await api('/api/internal/task/' + encodeURIComponent(taskId) + '/reject', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ note: note || undefined })
    });
    showTaskDetail(taskId);
  } catch (err) { alert('Reject failed: ' + err.message); }
}

async function reviseTask(taskId) {
  var note = prompt('Revision instructions:');
  if (!note) return;
  try {
    await api('/api/internal/task/' + encodeURIComponent(taskId) + '/revise', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ note: note })
    });
    showTaskDetail(taskId);
  } catch (err) { alert('Revise failed: ' + err.message); }
}

// ---------------------------------------------------------------------------
// Approvals page
// ---------------------------------------------------------------------------
async function loadApprovals() {
  try {
    var data = await api('/api/internal/approvals/pending');
    setConnectionStatus(true);

    var container = document.getElementById('approvals-list');
    if (data.count === 0) {
      setHtml(container, '<div class="bg-gray-900 border border-gray-800 rounded-xl p-8 text-center text-gray-500">No pending approvals</div>');
      return;
    }

    setHtml(container, data.approvals.map(function(a) {
      var draftPreview = '';
      try {
        var draft = typeof a.draft_json === 'string' ? JSON.parse(a.draft_json) : a.draft_json;
        draftPreview = escHtml(JSON.stringify(draft, null, 2));
      } catch (e) { draftPreview = '(no preview)'; }

      return '<div class="bg-gray-900 border border-gray-800 rounded-xl p-5">' +
        '<div class="flex items-center justify-between mb-3">' +
          '<div>' +
            '<span class="font-medium text-gray-200">' + escHtml(a.task_title || a.task_id) + '</span>' +
            '<span class="text-xs text-gray-500 ml-2">' + escHtml(shortPath(a.task_workspace || '')) + '</span>' +
          '</div>' +
          '<span class="text-xs text-gray-500">' + escHtml(timeAgo(a.created_at)) + '</span>' +
        '</div>' +
        '<pre class="bg-gray-950 border border-gray-700 rounded-lg p-3 text-xs text-gray-400 overflow-auto max-h-40 mb-3">' + draftPreview + '</pre>' +
        '<div class="flex gap-2">' +
          '<button data-action="approve" data-task="' + escHtml(a.task_id) + '" class="approval-action-btn px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-medium rounded-lg transition-colors">Approve</button>' +
          '<button data-action="reject" data-task="' + escHtml(a.task_id) + '" class="approval-action-btn px-3 py-1.5 bg-red-600 hover:bg-red-500 text-white text-xs font-medium rounded-lg transition-colors">Reject</button>' +
          '<button data-action="revise" data-task="' + escHtml(a.task_id) + '" class="approval-action-btn px-3 py-1.5 bg-amber-600 hover:bg-amber-500 text-white text-xs font-medium rounded-lg transition-colors">Revise</button>' +
        '</div>' +
      '</div>';
    }).join(''));

    // Attach handlers
    container.querySelectorAll('.approval-action-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var action = btn.getAttribute('data-action');
        var tid = btn.getAttribute('data-task');
        if (action === 'approve') approveTask(tid);
        else if (action === 'reject') rejectTask(tid);
        else if (action === 'revise') reviseTask(tid);
      });
    });
  } catch (err) { /* handled */ }
}

// ---------------------------------------------------------------------------
// Assets page
// ---------------------------------------------------------------------------
async function loadAssets() {
  try {
    var url = '/api/internal/assets';
    var type = document.getElementById('filter-asset-type').value;
    if (type) url += '?type=' + type;

    var data = await api(url);
    setConnectionStatus(true);

    var grid = document.getElementById('assets-grid');
    if (data.count === 0) {
      setHtml(grid, '<div class="col-span-3 bg-gray-900 border border-gray-800 rounded-xl p-8 text-center text-gray-500">No assets found</div>');
      return;
    }

    setHtml(grid, data.assets.map(function(a) {
      var tagsHtml = '';
      if (a.tags && a.tags.length) {
        tagsHtml = '<div class="flex flex-wrap gap-1 mt-2">' +
          a.tags.map(function(t) { return '<span class="px-1.5 py-0.5 bg-gray-800 text-gray-400 rounded text-xs">' + escHtml(t) + '</span>'; }).join('') +
        '</div>';
      }
      return '<div class="bg-gray-900 border border-gray-800 rounded-xl p-5">' +
        '<div class="flex items-center gap-2 mb-2">' +
          '<span class="inline-block px-2 py-0.5 rounded text-xs font-medium bg-gray-800 text-gray-400">' + escHtml(a.type || 'unknown') + '</span>' +
          '<span class="text-xs text-gray-500">' + escHtml(timeAgo(a.created_at)) + '</span>' +
        '</div>' +
        '<h3 class="font-medium text-gray-200 mb-1">' + escHtml(a.title) + '</h3>' +
        (a.description ? '<p class="text-xs text-gray-400 mb-2">' + escHtml(a.description) + '</p>' : '') +
        '<div class="text-xs text-gray-500 truncate">' + escHtml(a.path || '') + '</div>' +
        tagsHtml +
      '</div>';
    }).join(''));
  } catch (err) { /* handled */ }
}

// ---------------------------------------------------------------------------
// Auto-refresh
// ---------------------------------------------------------------------------
var refreshInterval;

function startAutoRefresh() {
  refreshInterval = setInterval(function() {
    if (currentPage === 'dashboard') loadDashboard();
    else if (currentPage === 'tasks') loadTasks();
    else if (currentPage === 'approvals') loadApprovals();
    else if (currentPage === 'assets') loadAssets();
  }, 10000);
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
document.addEventListener('DOMContentLoaded', function() {
  loadDashboard();
  startAutoRefresh();
});
</script>
